apiVersion: v1
kind: Service
metadata:
  name: coturn
  namespace: britishce44
spec:
  ports:
    - name: turn-udp
      port: 3478
      protocol: UDP
      targetPort: 3478
    - name: turn-tcp
      port: 3478
      protocol: TCP
      targetPort: 3478
    - name: turns-udp
      port: 5349
      protocol: UDP
      targetPort: 5349
    - name: turns-tcp
      port: 5349
      protocol: TCP
      targetPort: 5349
  selector:
    app: coturn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: britishce44
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: coturn
                topologyKey: kubernetes.io/hostname
      containers:
        - name: coturn
          image: coturn/coturn:4.6
          args: ['-c', '/etc/turnserver.conf']
          ports:
            - containerPort: 3478
              protocol: UDP
            - containerPort: 3478
              protocol: TCP
            - containerPort: 5349
              protocol: UDP
            - containerPort: 5349
              protocol: TCP
          env:
            - name: TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: turn-secret
                  key: secret
          volumeMounts:
            - name: config
              mountPath: /etc/turnserver.conf
              subPath: turnserver.conf
      volumes:
        - name: config
          configMap:
            name: coturn-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: britishce44
data:
  turnserver.conf: |
    listening-port=3478
    tls-listening-port=5349
    realm=britishce44.edu
    server-name=britishce44
    fingerprint
    lt-cred-mech
    use-auth-secret
    static-auth-secret={{TURN_SECRET}}
    total-quota=100
    stale-nonce=600
    no-loopback-peers
    no-multicast-peers
    mobility
    pidfile=/var/run/turnserver.pid
    log-file=/var/log/turnserver.log
    simple-log
