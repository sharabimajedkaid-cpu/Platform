# ============================================================
# Britishce44 Domain + SSL Setup (Caddy reverse proxy)
# ============================================================
# Replace DOMAIN_NAME with your actual domain (e.g., britishce44.edu)

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '3478:3478/udp'
      - '5349:5349/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - b44-net

volumes:
  caddy-data:
  caddy-config:

networks:
  b44-net:
    external: true
