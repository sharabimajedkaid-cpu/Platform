  coturn:
    image: coturn/coturn:4.6
    ports:
      - '3478:3478/udp'
      - '3478:3478/tcp'
      - '5349:5349/udp'
      - '5349:5349/tcp'
    command: -c /etc/turnserver.conf
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
    environment:
      - TURN_SECRET=${TURN_SECRET:-britishce44-turn-secret}
    networks: [b44-net]
    restart: unless-stopped
