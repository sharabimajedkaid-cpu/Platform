kind = "mobile"
previewPath = "/britishce44-mobile/"
title = "Britishce44 Mobile"
version = "1.0.0"
id = "artifacts/britishce44-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/britishce44-mobile/" ]
localPort = 21413

[services.development]
run = "pnpm --filter @workspace/britishce44-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/britishce44-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/britishce44-mobile", "run", "serve" ]

[services.env]
PORT = "21413"
BASE_PATH = "/britishce44-mobile/"
