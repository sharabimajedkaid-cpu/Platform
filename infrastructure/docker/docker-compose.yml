name: britishce44

services:
  api-gateway:
    build:
      context: ../..
      dockerfile: backend/services/api-gateway/Dockerfile
    ports: ['3000:3000']
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-britishce44-jwt-secret-prod}
    depends_on: [redis, postgres]
    restart: unless-stopped
    networks: [b44-net]

  auth-service:
    build:
      context: ../..
      dockerfile: backend/services/auth-service/Dockerfile
    ports: ['3001:3001']
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-britishce44-jwt-secret-prod}
      - REDIS_URL=redis://redis:6379
    depends_on: [redis]
    restart: unless-stopped
    networks: [b44-net]

  classroom-service:
    build:
      context: ../..
      dockerfile: backend/services/classroom-service/Dockerfile
    ports: ['3002:3002']
    environment:
      - PORT=3002
      - REDIS_URL=redis://redis:6379
    depends_on: [redis]
    restart: unless-stopped
    networks: [b44-net]

  lms-service:
    build:
      context: ../..
      dockerfile: backend/services/lms-service/Dockerfile
    ports: ['3003:3003']
    environment:
      - PORT=3003
    depends_on: [postgres]
    restart: unless-stopped
    networks: [b44-net]

  messaging-service:
    build:
      context: ../..
      dockerfile: backend/services/messaging-service/Dockerfile
    ports: ['3004:3004']
    environment:
      - PORT=3004
    depends_on: [redis]
    restart: unless-stopped
    networks: [b44-net]

  ai-orchestrator:
    build:
      context: ../..
      dockerfile: backend/services/ai-orchestrator/Dockerfile
    ports: ['3005:3005']
    environment:
      - PORT=3005
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    networks: [b44-net]

  erp-service:
    build:
      context: ../..
      dockerfile: backend/services/erp-service/Dockerfile
    ports: ['3006:3006']
    environment:
      - PORT=3006
    depends_on: [postgres]
    restart: unless-stopped
    networks: [b44-net]

  analytics-service:
    build:
      context: ../..
      dockerfile: backend/services/analytics-service/Dockerfile
    ports: ['3007:3007']
    environment:
      - PORT=3007
    depends_on: [postgres]
    restart: unless-stopped
    networks: [b44-net]

  notification-service:
    build:
      context: ../..
      dockerfile: backend/services/notification-service/Dockerfile
    ports: ['3008:3008']
    environment:
      - PORT=3008
    depends_on: [redis]
    restart: unless-stopped
    networks: [b44-net]

  recording-service:
    build:
      context: ../..
      dockerfile: backend/services/recording-service/Dockerfile
    ports: ['3009:3009']
    environment:
      - PORT=3009
      - MINIO_ENDPOINT=minio:9000
    depends_on: [minio]
    restart: unless-stopped
    networks: [b44-net]

  billing-service:
    build:
      context: ../..
      dockerfile: backend/services/billing-service/Dockerfile
    ports: ['3010:3010']
    environment:
      - PORT=3010
    depends_on: [postgres]
    restart: unless-stopped
    networks: [b44-net]

  search-service:
    build:
      context: ../..
      dockerfile: backend/services/search-service/Dockerfile
    ports: ['3011:3011']
    environment:
      - PORT=3011
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on: [elasticsearch]
    restart: unless-stopped
    networks: [b44-net]

  frontend:
    build:
      context: ../..
      dockerfile: frontend/web/Dockerfile
    ports: ['80:3000']
    environment:
      - API_GATEWAY_URL=http://api-gateway:3000
    depends_on: [api-gateway]
    restart: unless-stopped
    networks: [b44-net]

  postgres:
    image: postgres:16-alpine
    ports: ['5432:5432']
    environment:
      POSTGRES_DB: britishce44
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [b44-net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    volumes: [redis-data:/data]
    networks: [b44-net]
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports: ['27017:27017']
    environment:
      MONGO_INITDB_DATABASE: britishce44
    volumes: [mongo-data:/data/db]
    networks: [b44-net]
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.12
    ports: ['9200:9200']
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes: [es-data:/usr/share/elasticsearch/data]
    networks: [b44-net]
    restart: unless-stopped

  minio:
    image: minio/minio
    ports: ['9000:9000', '9001:9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes: [minio-data:/data]
    networks: [b44-net]
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6
    ports:
      - '3478:3478/udp'
      - '3478:3478/tcp'
      - '5349:5349/udp'
      - '5349:5349/tcp'
    command: -c /etc/turnserver.conf
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
    environment:
      - TURN_SECRET=${TURN_SECRET:-britishce44-turn-secret}
    networks: [b44-net]
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  mongo-data:
  es-data:
  minio-data:

networks:
  b44-net:
    driver: bridge
